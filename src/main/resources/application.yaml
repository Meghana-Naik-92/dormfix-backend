server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dormfix_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: host1
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
      
# Custom DormFix properties (used in JwtUtil and file upload)
app:
  jwt:
    secret: dormfix-super-secret-jwt-key-2024-minimum-32-chars
    expiration: 86400000
  upload:
    dir: uploads/